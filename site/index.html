<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<title>Tabela Periódica</title>
</head>

<body>

<header>
    <div class="header_container">

        <a href="https://www.google.com/" id="buttonBack">
            <i class="fa-solid fa-x"></i>
        </a>

        <h4>Tabela Periódica MLMB</h4>

        <div class="menu-area">
            <button id="buttonMenu">☰</button>

            <ul id="menuDropdown">
                <li><a href="#">Início</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Serviços</a></li>
                <li><a href="#">Contato</a></li>
                <li><a href="#">Sobre Nós</a></li>
            </ul>
        </div>

    </div>
</header>

<main>

<div class="table-periodic">

    <!-- HIDROGÊNIO -->
    <div class="elemento" style="grid-column:1; background:#e6f0ff;">
        <span class="numero">1</span>
        <span class="simbolo">H</span>
        <span class="nome">Hidrogênio</span>
    </div>

    <!-- HÉLIO -->
    <div class="elemento" style="grid-column:18; background:#fff4e6;">
        <span class="numero">2</span>
        <span class="simbolo">He</span>
        <span class="nome">Hélio</span>
    </div>

    <!-- LÍTIO -->
    <div class="elemento" style="grid-column:1; background:#dbf8ff;">
        <span class="numero">3</span>
        <span class="simbolo">Li</span>
        <span class="nome">Lítio</span>
    </div>

    <!-- SÓDIO -->
    <div class="elemento" style="grid-column:1; background:#dbf8ff;">
        <span class="numero">11</span>
        <span class="simbolo">Na</span>
        <span class="nome">Sódio</span>    
    </div>
    <!-- POTÁSSIO -->
    <div class="elemento" style="grid-column:1; background:#dbf8ff;">
        <span class="numero">19</span>
        <span class="simbolo">K</span>
        <span class="nome">Potássio</span>    
    </div>
    <!-- RUBÍDIO -->
    <div class="elemento" style="grid-column:1; background:#dbf8ff;">
        <span class="numero">37</span>
        <span class="simbolo">Rb</span>
        <span class="nome">Rubídio</span>    
    </div>
    <!-- CÉSIO -->
    <div class="elemento" style="grid-column:1; background:#dbf8ff;">
        <span class="numero">55</span>
        <span class="simbolo">Cs</span>
        <span class="nome">Césio</span>   
    </div> 
    <!-- FRÂNCIO -->
    <div class="elemento" style="grid-column:1; background:#dbf8ff;">
        <span class="numero">87</span>
        <span class="simbolo">Fr</span>
        <span class="nome">Frãncio</span>   
    </div>
    <!-- BERÍLIO -->
    <div class="elemento" style="grid-column:1; background:#dbf8ff;">
        <span class="numero">4</span>
        <span class="simbolo">Be</span>
        <span class="nome">Berílio</span>   
    </div>
    <!-- MAGNÉSIO -->
    <div class="elemento" style="grid-column:1; background:#dbf8ff;">
        <span class="numero">4</span>
        <span class="simbolo">Be</span>
        <span class="nome">Berílio</span>   
    </div>
</div>

</main>

<script src="script.js"></script>

</body>
</html>
