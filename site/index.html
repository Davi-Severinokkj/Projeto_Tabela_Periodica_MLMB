<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<title>Tabela Periódica</title>
</head>

<body>

<header>
    <div class="header_container">

        <a href="https://www.google.com/" id="buttonBack">
            <i class="fa-solid fa-x"></i>
        </a>

        <h4>Tabela Periódica MLMB</h4>

        <div class="menu-area">
            <button id="buttonMenu">☰</button>

            <ul id="menuDropdown">
                <li><a href="#">Início</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Serviços</a></li>
                <li><a href="#">Contato</a></li>
                <li><a href="#">Sobre Nós</a></li>
            </ul>
        </div>

    </div>
</header>

<main>

<div class="table-periodic">

    <!-- HIDROGÊNIO -->
    <div class="elemento" style="grid-column:1; grid-row:1;">
        <span class="numero">1</span>
        <a href="#" class="simbolo">H</a>
        <span class="nome">Hidrogênio</span>
    </div>

    <!-- HÉLIO -->
    <div class="elemento" style="grid-column:18; grid-row:1;">
        <span class="numero">2</span>
        <a href="#" class="simbolo">He</a>
        <span class="nome">Hélio</span>
    </div>

    <!-- LÍTIO -->
    <div class="elemento" style="grid-column:1; grid-row:2;">
        <span class="numero">3</span>
        <a href="#" class="simbolo">Li</a>
        <span class="nome">Lítio</span>
    </div>

    <!-- BERÍLIO -->
    <div class="elemento" style="grid-column:2; grid-row:2;">
        <span class="numero">4</span>
        <a href="#" class="simbolo">Be</a>
        <span class="nome">Berílio</span>
    </div>

    <!-- BORO -->
    <div class="elemento" style="grid-column:13; grid-row:2;">
        <span class="numero">5</span>
        <a href="#" class="simbolo">B</a>
        <span class="nome">Boro</span>
    </div>

    <!-- CARBONO -->
    <div class="elemento" style="grid-column:14; grid-row:2;">
        <span class="numero">6</span>
        <a href="#" class="simbolo">C</a>
        <span class="nome">Carbono</span>
    </div>

    <!-- NITROGÊNIO -->
    <div class="elemento" style="grid-column:15; grid-row:2;">
        <span class="numero">7</span>
        <a href="#" class="simbolo">N</a>
        <span class="nome">Nitrogênio</span>
    </div>

    <!-- OXIGÊNIO -->
    <div class="elemento" style="grid-column:16; grid-row:2;">
        <span class="numero">8</span>
        <a href="#" class="simbolo">O</a>
        <span class="nome">Oxigênio</span>
    </div>

    <!-- FLÚOR -->
    <div class="elemento" style="grid-column:17; grid-row:2;">
        <span class="numero">9</span>
        <a href="#" class="simbolo">F</a>
        <span class="nome">Flúor</span>
    </div>

    <!-- NEÔNIO -->
    <div class="elemento" style="grid-column:18; grid-row:2;">
        <span class="numero">10</span>
        <a href="#" class="simbolo">Ne</a>
        <span class="nome">Neônio</span>
    </div>

    <!-- SÓDIO -->
    <div class="elemento" style="grid-column:1; background:#008080;">
        <span class="numero">11</span>
        <a href="#" class="simbolo">Na</a>
        <span class="nome">Sódio</span>    
    </div>

</div>
</main>

<script src="script.js"></script>

</body>
</html>
